spring:
  application:
    name: ecommerce

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=shop;encrypt=false
    username: bang
    password: xlqm4968
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
    show-sql: true
    open-in-view: false

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT 설정
jwt:
  secret: your-256-bit-secret-key-change-this-in-production-environment-please
  expiration: 86400000  # 24시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# 로깅 설정
logging:
  level:
    root: INFO
    com.shop.ecommerce: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
