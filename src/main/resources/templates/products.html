<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products - MyShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h2 class="mb-4">상품 목록</h2>
    <div class="row" th:if="${products}">
        <div class="col-md-4 mb-3" th:each="p : ${products}">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${p.name}"></h5>
                    <p class="card-text" th:text="${p.description}"></p>
                    <p class="card-text">가격: <span th:text="${p.price}"></span>원</p>
                    <p class="card-text">재고: <span th:text="${p.stock}"></span></p>
                    <form th:action="@{'/cart/add/' + ${p.id}}" method="post">
                        <button class="btn btn-primary" type="submit">장바구니 담기</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
