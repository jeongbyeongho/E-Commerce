<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cart - MyShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h2 class="mb-4">장바구니</h2>
    <table class="table table-striped" th:if="${cart}">
        <thead>
        <tr>
            <th>상품명</th>
            <th>가격</th>
            <th>액션</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${cart}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td>
                <form th:action="@{'/cart/remove/' + ${p.id}}" method="post">
                    <button class="btn btn-danger btn-sm" type="submit">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/products" class="btn btn-secondary mt-3">상품 목록으로 돌아가기</a>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
