<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - MyShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<!-- 메인 배너 -->
<div class="container-fluid p-0">
    <div class="position-relative">
        <img src="https://via.placeholder.com/1500x400?text=MyShop+Banner" class="img-fluid w-100" alt="Banners">
        <div class="position-absolute top-50 start-50 translate-middle text-white text-center">
            <h1>Bang Shop</h1>
            <p class="lead">Browse our amazing products</p>
        </div>
    </div>
</div>

<!-- 검색창 -->
<div class="container mt-4">
    <form class="d-flex" th:action="@{/products}" method="get">
        <input class="form-control me-2" type="search" placeholder="Search products" name="keyword">
        <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
</div>

<!-- 카테고리 메뉴 -->
<div class="container mt-4">
    <div class="row text-center">
        <div class="col">
            <button class="btn btn-light border">Electronics</button>
        </div>
        <div class="col">
            <button class="btn btn-light border">Clothing</button>
        </div>
        <div class="col">
            <button class="btn btn-light border">Books</button>
        </div>
        <div class="col">
            <button class="btn btn-light border">Home & Kitchen</button>
        </div>
    </div>
</div>

<!-- 추천 상품 섹션 -->
<div class="container mt-5">
    <h3>추천 상품</h3>
    <div class="row mt-3" th:if="${products}">
        <div class="col-md-3 mb-4" th:each="p : ${products}">
            <div class="card h-100">
                <img src="https://via.placeholder.com/300x200?text=Product+Image" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${p.name}">Product Name</h5>
                    <p class="card-text" th:text="${p.description}">Description</p>
                    <p class="card-text mt-auto">가격: <span th:text="${p.price}"></span>원</p>
                    <form th:action="@{'/cart/add/' + ${p.id}}" method="post">
                        <button class="btn btn-primary w-100 mt-2" type="submit">장바구니 담기</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
